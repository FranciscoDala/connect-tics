<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Painel | Connect-Tics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg: #0A0A0B;
            --card: #111113;
            --border: #222224;
            --text: #EAEAEA;
            --muted: #888;
            --accent: #FF6600;
            --danger: #EF4444;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
        }

        .swal2-popup {
            background: var(--card) !important;
            color: var(--text) !important;
            border: 1px solid var(--border);
        }

        .swal2-title,
        .swal2-html-container {
            color: var(--text) !important;
        }

        .swal2-confirm {
            background: var(--accent) !important;
            color: #000 !important;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        /* mudei margin-bottom */
        .topbar h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        /* NOVO: CSS DAS ABAS - Só isso de novo */
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .tab-btn {
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .tab-btn.active {
            color: var(--accent);
            border-color: var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 14px 16px;
            text-align: left;
            font-size: 14px;
        }

        thead {
            background: #0F0F11;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            font-size: 12px;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            padding: 24px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            font-size: 14px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            justify-content: flex-end;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="topbar">
            <h1>Painel Admin</h1> <!-- Mudei o título pra geral -->
            <button class="btn btn-outline" id="btnLogout">Sair</button>
        </div>

        <!-- NOVO: MENU DE ABAS -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="users">Usuários</button>
            <button class="tab-btn" data-tab="posts">Postagens</button>
        </div>

        <!-- ABRA A ABA USUARIOS: Todo teu código foi colado aqui dentro, sem alterar -->
        <div class="tab-content active" id="tab-users">
            <div style="display:flex; justify-content: flex-end; margin-bottom: 16px;">
                <button class="btn" id="btnAdd">+ Adicionar</button>
            </div>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th style="width:180px;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="usersTable">
                        <tr>
                            <td colspan="3" class="loading">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="modal" id="userModal">
                <div class="modal-content">
                    <h2 id="modalTitle">Adicionar Usuário</h2>
                    <form id="userForm" onsubmit="return false">
                        <input type="hidden" id="userId">
                        <input type="text" id="username" name="username" placeholder="Username" required>
                        <input type="password" id="password" name="password" placeholder="Senha"
                            autocomplete="new-password">
                        <small id="passHelp" style="color:var(--muted);">Deixe vazio para não alterar a senha</small>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline" id="btnCancel">Cancelar</button>
                            <button type="button" class="btn" id="btnSave">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <!-- FECHA A ABA USUARIOS -->


















        <!-- NOVA ABA POSTAGENS: Vazia por enquanto -->
        <!-- NOVA ABA POSTAGENS: COM CRUD -->
        <div class="tab-content" id="tab-posts">
            <div style="display:flex; justify-content: flex-end; margin-bottom: 16px;">
                <button class="btn" id="btnAddPost">+ Nova Postagem</button>
            </div>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Capa</th>
                            <th>Título</th>
                            <th>Cat</th>
                            <th>Tipo</th>
                            <th>Data</th>
                            <th style="width:180px;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="postsTable">
                        <tr>
                            <td colspan="7" class="loading">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- MODAL POST: NOVO, ISOLADO -->
    <div class="modal" id="postModal">
        <div class="modal-content" style="max-width: 520px; max-height: 90vh; overflow-y: auto;">
            <h2 id="postModalTitle">Nova Postagem</h2>
            <form id="postForm" onsubmit="return false">
                <input type="hidden" id="postId">
                <select id="postCategory" name="category_id" required
                    style="width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 14px;">
                    <option value="">Selecione a Categoria...</option>
                </select>
                <input type="text" id="postTitle" name="title" placeholder="Título" required
                    style="width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 14px;">
                <select id="postType" name="type" required
                    style="width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 14px;">
                    <option value="normal">Post Normal / Anúncio</option>
                    <option value="fotos">Só Fotos / Carrossel</option>
                </select>
                <div id="fieldsNormal">
                    <textarea id="postContent" name="content" placeholder="Descrição" rows="3"
                        style="width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 14px; font-family: inherit;"></textarea>
                    <input type="text" id="postPrice" name="price" placeholder="Preço ex: 25.000 Kz"
                        style="width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 14px;">
                    <input type="url" id="postLink" name="link" placeholder="Link ou WhatsApp"
                        style="width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 14px;">
                    <label style="font-size: 12px; color: var(--muted);">Capa 1 imagem:</label>
                    <input type="file" id="postCover" name="cover_image" accept="image/*"
                        style="width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 14px;">
                </div>

                <div id="fieldsFotos" style="display:none;">
                    <label style="font-size: 12px; color: var(--muted);">Múltiplas Fotos:</label>
                    <div id="postImagesWrap" style="display: flex; flex-direction: column; gap: 8px;">
                        <!-- O JS vai criar o 1º input aqui com o X -->
                    </div>
                    <button type="button" id="btnAddMorePhoto" class="btn btn-outline"
                        style="width: 100%; margin-top: 8px;">+ Adicionar mais foto</button>
                </div>

                <div style="display: flex; align-items: center; gap: 8px; margin: 8px 0;">
                    <input type="checkbox" id="postHighlight" name="is_highlighted">
                    <label for="postHighlight" style="font-size: 14px;">Marcar como Destaque 🔥</label>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-outline"
                        id="btnCancelPost">Cancelar</button><button type="button" class="btn"
                        id="btnSavePost">Salvar</button></div>
            </form>
        </div>
    </div>

    </div>

    <script>
        const API = '/admin';
        const AUTH_KEY = 'access_token';
        const tableBody = document.getElementById('usersTable');
        const modal = document.getElementById('userModal');
        const form = document.getElementById('userForm');
        let usersCache = [];

        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem(AUTH_KEY)) { window.location.replace('/'); return; }
            carregarUsers();
        });

        // FIX: SweetAlert no lugar do toast
        const showAlert = (title, text = '', icon = 'success') => {
            Swal.fire({ title, text, icon, confirmButtonText: 'OK', timer: icon === 'success' ? 1500 : undefined });
        };

        const apiFetch = async (url, options = {}) => {
            const token = localStorage.getItem(AUTH_KEY);
            const res = await fetch(url, { ...options, headers: { ...options.headers, 'Authorization': `Bearer ${token}` } });
            if (res.status === 401) { localStorage.removeItem(AUTH_KEY); window.location.replace('/'); throw new Error('Sessão expirada.'); }
            let data = {};
            try { data = await res.json(); } catch (e) { }
            if (!res.ok) {
                const msg = data.detail || `Erro ${res.status}`;
                throw new Error(msg);
            }
            return data;
        };

        async function carregarUsers() {
            try {
                usersCache = await apiFetch(`${API}/users`);
                renderTable();
            } catch (e) {
                tableBody.innerHTML = `<tr><td colspan="3" class="loading" style="color:var(--danger)">${e.message}</td></tr>`;
            }
        }

        function renderTable() {
            tableBody.innerHTML = usersCache.length ? usersCache.map(u => `
                <tr><td>${u.id}</td><td>${escapeHtml(u.username)}</td>
                <td class="actions">
                <button class="btn btn-outline" data-edit="${u.id}">Editar</button>
                ${u.id !== 1 ? `<button class="btn btn-danger" data-del="${u.id}">Apagar</button>` : ''}
                </td></tr>`).join('') : `<tr><td colspan="3" class="loading">Nenhum usuário</td></tr>`;
        }

        function escapeHtml(str) { return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }
        function abrirModal(user = null) {
            form.reset();
            document.getElementById('userId').value = user?.id || '';
            document.getElementById('username').value = user?.username || '';
            document.getElementById('modalTitle').textContent = user ? 'Editar Usuário' : 'Adicionar Usuário';
            document.getElementById('password').required = !user;
            document.getElementById('password').value = '';
            document.getElementById('passHelp').style.display = user ? 'block' : 'none';
            modal.classList.add('active');
        }
        const fecharModal = () => modal.classList.remove('active');

        document.getElementById('btnSave').onclick = async () => {
            const btn = document.getElementById('btnSave');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const id = document.getElementById('userId').value;

            if (!username) return showAlert('Erro', 'Preencha o username', 'error');
            if (!id && password.length < 6) return showAlert('Erro', 'Senha precisa ter 6+ digitos', 'error');

            btn.disabled = true; btn.textContent = 'Salvando...';
            try {
                const formData = new FormData();
                formData.append('username', username);
                if (password) formData.append('password', password);
                const url = id ? `${API}/users/edit/${id}` : `${API}/users/add`;
                await apiFetch(url, { method: 'POST', body: formData });
                showAlert('Sucesso', id ? 'Usuário atualizado' : 'Usuário criado', 'success');
                fecharModal(); carregarUsers();
            } catch (e) {
                showAlert('Erro 500', e.message, 'error');
                console.error("ERRO SALVAR:", e);
            }
            finally {
                btn.disabled = false; btn.textContent = 'Salvar';
            }
        };

        document.getElementById('btnLogout').onclick = async () => {
            await apiFetch('/api/logout', { method: 'POST' }).catch(() => { });
            localStorage.removeItem(AUTH_KEY); window.location.replace('/');
        };
        document.getElementById('btnAdd').onclick = () => abrirModal();
        document.getElementById('btnCancel').onclick = fecharModal;
        modal.onclick = e => e.target === modal && fecharModal();

        tableBody.onclick = async (e) => {
            const editId = e.target.dataset.edit;
            const delId = e.target.dataset.del;
            if (editId) abrirModal(usersCache.find(u => u.id == editId));
            if (delId) {
                const result = await Swal.fire({
                    title: 'Apagar?',
                    text: "Não dá pra desfazer!",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#EF4444',
                    cancelButtonText: 'Cancelar',
                    confirmButtonText: 'Sim, apagar'
                });
                if (result.isConfirmed) {
                    try { await apiFetch(`${API}/users/delete/${delId}`, { method: 'POST' }); showAlert('Apagado', 'Usuário removido', 'success'); carregarUsers(); }
                    catch (e) { showAlert('Erro', e.message, 'error'); }
                }
            }
        };

        // NOVO: JS DAS ABAS - Só isso de novo. Não toca no código de cima
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
            });
        });


// ===================================================================
// BLOCO POSTAGENS - V9 FINAL. EDIT COM FOTOS
// ===================================================================
(function PostModule() {
    if (!document.getElementById('tab-posts')) return;

    const _p = {};
    _p.cache = [];
    _p.catCache = [];
    _p.tableBody = document.getElementById('postsTable');
    _p.modal = document.getElementById('postModal');
    _p.isNew = (dateStr) => (Date.now() - new Date(dateStr).getTime()) < 7 * 24 * 60 * 60 * 1000;

    _p.carregarCats = async () => {
        try {
            _p.catCache = await apiFetch(`${API}/categories`);
            document.getElementById('postCategory').innerHTML = '<option value="">Selecione a Categoria...</option>' + _p.catCache.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
        } catch (e) {
            console.error("Erro cat:", e);
            showAlert('Erro', 'Não carregou categorias: ' + e.message, 'error');
        }
    };

    _p.carregar = async () => {
        try {
            _p.cache = await apiFetch(`${API}/posts`);
            _p.render();
        } catch (e) {
            _p.tableBody.innerHTML = `<tr><td colspan="7" class="loading" style="color:var(--danger)">${e.message}</td></tr>`;
        }
    };

    _p.render = () => {
        if (!_p.tableBody) return;
        if (_p.cache.length === 0) {
            _p.tableBody.innerHTML = `<tr><td colspan="7" class="loading">Nenhuma postagem</td></tr>`;
            return;
        }
        _p.tableBody.innerHTML = _p.cache.map(p => {
            const imgSrc = p.cover_image || (p.images && p.images[0]? p.images[0].image_url : '') || 'https://placehold.co/40x40/111113/888?text=+';
            const tagNovo = _p.isNew(p.created_at)? '<span style="font-size: 11px; padding: 3px 8px; border-radius: 999px; font-weight: 700; margin-left: 6px; background: #22C55E; color: #000;">NOVO</span>' : '';
            const tagFire = p.is_highlighted? '<span style="font-size: 11px; padding: 3px 8px; border-radius: 999px; font-weight: 700; margin-left: 6px; background: var(--accent); color: #000;">🔥</span>' : '';
            return `
            <tr>
                <td>${p.id}</td>
                <td><img src="${imgSrc}" onerror="this.src='https://placehold.co/40x40/111113/888?text=?'" style="width: 40px; height: 40px; object-fit: cover; border-radius: 6px;"></td>
                <td style="max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${escapeHtml(p.title)}">
                    ${escapeHtml(p.title)} ${tagFire} ${tagNovo}
                </td>
                <td>${escapeHtml(p.category_name || '')}</td>
                <td>${p.type === 'fotos'? 'Fotos' : 'Normal'}</td>
                <td>${new Date(p.created_at).toLocaleDateString('pt-AO')}</td>
                <td class="actions">
                    <button class="btn btn-outline" data-edit-post="${p.id}">Editar</button>
                    <button class="btn btn-danger" data-del-post="${p.id}">Apagar</button>
                </td>
            </tr>`;
        }).join('');
    };

    _p.toggleFields = () => {
        const type = document.getElementById('postType').value;
        document.getElementById('fieldsNormal').style.display = type === 'fotos'? 'none' : 'block';
        document.getElementById('fieldsFotos').style.display = type === 'normal'? 'none' : 'block';
    };

    _p.createImageRow = (existingUrl = null) => { // CORRIGIDO V9: Aceita URL existente
        const wrap = document.createElement('div');
        wrap.style.display = 'flex';
        wrap.style.gap = '8px';
        wrap.style.alignItems = 'center';
        wrap.style.marginBottom = '8px';

        if (existingUrl) { // Se for foto antiga, mostra preview + input hidden
            const img = document.createElement('img');
            img.src = existingUrl;
            img.style.width = '50px';
            img.style.height = '50px';
            img.style.objectFit = 'cover';
            img.style.borderRadius = '6px';
            wrap.appendChild(img);

            const hidden = document.createElement('input');
            hidden.type = 'hidden';
            hidden.name = 'existing_images'; // Nome diferente pra backend saber
            hidden.value = existingUrl;
            wrap.appendChild(hidden);
        } else { // Se for nova, mostra input file normal
            const input = document.createElement('input');
            input.type = 'file';
            input.name = 'images';
            input.accept = 'image/*';
            input.style.flex = '1';
            input.style.padding = '12px';
            input.style.background = 'var(--bg)';
            input.style.border = '1px solid var(--border)';
            input.style.color = 'var(--text)';
            input.style.borderRadius = '8px';
            input.style.fontSize = '14px';
            wrap.appendChild(input);
        }

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-danger btnRemovePhoto';
        btn.textContent = 'X';
        btn.style.padding = '12px 14px';
        btn.style.flexShrink = '0';
        wrap.appendChild(btn);
        return wrap;
    };

    _p.abrirModal = (post = null) => {
        document.getElementById('postForm').reset();
        const wrap = document.getElementById('postImagesWrap');
        wrap.innerHTML = '';

        if (post && post.type === 'fotos' && post.images.length > 0) {
            // CORRIGIDO V9: Carrega todas as fotos antigas
            post.images.forEach(img => wrap.appendChild(_p.createImageRow(img.image_url)));
        } else {
            wrap.appendChild(_p.createImageRow()); // 1 campo vazio pra novo
        }

        document.getElementById('postId').value = post? post.id : '';
        document.getElementById('postCategory').value = post? post.category_id : '';
        document.getElementById('postTitle').value = post? post.title : '';
        document.getElementById('postType').value = post? post.type : 'normal';
        document.getElementById('postContent').value = post? post.content : '';
        document.getElementById('postPrice').value = post? post.price : '';
        document.getElementById('postLink').value = post? post.link : '';
        document.getElementById('postHighlight').checked = post? post.is_highlighted : false;

        _p.toggleFields();
        document.getElementById('postModalTitle').textContent = post? 'Editar Postagem' : 'Nova Postagem';
        _p.modal.classList.add('active');
    };

    _p.fecharModal = () => { _p.modal.classList.remove('active'); };

    document.getElementById('postType').onchange = _p.toggleFields;
    document.getElementById('btnAddPost').onclick = () => _p.abrirModal();
    document.getElementById('btnCancelPost').onclick = _p.fecharModal;
    _p.modal.onclick = e => { if (e.target.id === 'postModal') _p.fecharModal(); };
    document.getElementById('btnAddMorePhoto').onclick = () => { document.getElementById('postImagesWrap').appendChild(_p.createImageRow()); }; // Adiciona nova

    document.getElementById('postImagesWrap').onclick = (e) => {
        if (e.target.classList.contains('btnRemovePhoto')) {
            const wrap = document.getElementById('postImagesWrap');
            if (wrap.children.length > 1) {
                e.target.parentElement.remove();
            } else {
                showAlert('Aviso', 'Tem que ter ao menos 1 campo de foto', 'warning');
            }
        }
    };

    document.getElementById('btnSavePost').onclick = async () => {
        const btn = document.getElementById('btnSavePost');
        const id = document.getElementById('postId').value;
        const type = document.getElementById('postType').value;
        const fd = new FormData();

        fd.append('category_id', document.getElementById('postCategory').value);
        fd.append('title', document.getElementById('postTitle').value.trim());
        fd.append('type', type);
        fd.append('is_highlighted', document.getElementById('postHighlight').checked);

        if (type === 'normal') {
            fd.append('content', document.getElementById('postContent').value.trim());
            const priceVal = document.getElementById('postPrice').value.trim();
            if (priceVal) fd.append('price', priceVal);
            const linkVal = document.getElementById('postLink').value.trim();
            if (linkVal) fd.append('link', linkVal);
            const cover = document.getElementById('postCover').files[0];
            if (cover) fd.append('cover_image', cover);
        } else {
            fd.append('price', ''); // Garante None
        }

        if (type === 'fotos') {
            // CORRIGIDO V9: Manda as antigas + as novas
            const existing = [...document.querySelectorAll('#postImagesWrap input[name="existing_images"]')].map(i => i.value);
            existing.forEach(url => fd.append('existing_images', url)); // Manda URLs pra manter

            const files = [...document.querySelectorAll('#postImagesWrap input[type="file"]')].map(i => i.files[0]).filter(Boolean);
            files.forEach(f => fd.append('images', f)); // Manda arquivos novos
            if (files.length === 0 && existing.length === 0 &&!id) return showAlert('Erro', 'Selecione ao menos 1 foto', 'error');
        }

        if (!fd.get('category_id') ||!fd.get('title')) return showAlert('Erro', 'Preencha Categoria e Título', 'error');

        btn.disabled = true; btn.textContent = 'Salvando...';
        try {
            const url = id? `${API}/posts/${id}` : `${API}/posts`;
            await apiFetch(url, { method: id? 'PUT' : 'POST', body: fd });
            showAlert('Sucesso', id? 'Post atualizado' : 'Post criado', 'success');
            _p.fecharModal(); _p.carregar();
        } catch (e) { showAlert('Erro', e.message, 'error'); }
        finally { btn.disabled = false; btn.textContent = 'Salvar'; }
    };

    _p.tableBody.onclick = async (e) => {
        const editId = e.target.dataset.editPost;
        const delId = e.target.dataset.delPost;
        if (editId) {
            _p.abrirModal(_p.cache.find(p => p.id == editId));
        }
        if (delId) {
            const result = await Swal.fire({ title: 'Apagar Post?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#EF4444' });
            if (result.isConfirmed) {
                try {
                    await apiFetch(`${API}/posts/${delId}`, { method: 'DELETE' });
                    showAlert('Apagado', 'Post removido', 'success');
                    _p.carregar();
                } catch (e) {
                    showAlert('Erro', e.message, 'error');
                }
            }
        }
    };

    document.querySelector('.tab-btn[data-tab="posts"]').addEventListener('click', () => {
        if (_p.cache.length === 0) {
            _p.carregarCats();
            _p.carregar();
        }
    });
})();
// ===================================================================
// FIM BLOCO POSTAGENS
// ===================================================================

    </script>
